<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tracewise AI — System Architecture</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #fff;
    color: #1a1a2e;
    width: 210mm;
    min-height: 297mm;
  }

  .page {
    padding: 22mm 16mm 16mm 16mm;
    min-height: 297mm;
    position: relative;
  }

  /* Header */
  .header {
    text-align: center;
    margin-bottom: 18px;
    border-bottom: 3px solid #4361ee;
    padding-bottom: 10px;
  }
  .header h1 { font-size: 24px; color: #1a1a2e; }
  .header .subtitle { font-size: 11px; color: #666; margin-top: 3px; }

  /* SVG flowchart container */
  .flowchart {
    width: 100%;
    height: 520px;
  }

  /* Node styles */
  .node { cursor: default; }
  .node rect, .node circle {
    stroke-width: 1.5;
  }
  .node-text {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    fill: #fff;
    font-weight: 600;
  }
  .node-sub {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    fill: #fff;
    font-size: 9px;
    opacity: 0.9;
  }
  .node-label {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    fill: #333;
    font-size: 9px;
    font-weight: 400;
  }
  .edge-label {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    fill: #888;
    font-size: 8px;
    font-style: italic;
  }

  /* Footer */
  .footer {
    margin-top: 8px;
    text-align: center;
    font-size: 9px;
    color: #999;
    border-top: 1px solid #e0e0e0;
    padding-top: 8px;
    display: flex;
    justify-content: space-between;
  }
</style>
</head>
<body>
<div class="page">

  <div class="header">
    <h1>Tracewise AI</h1>
    <div class="subtitle">AI Across the Product Development Lifecycle — System Architecture Flowchart</div>
  </div>

  <svg class="flowchart" viewBox="0 0 760 520" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
        <path d="M0,0 L8,3 L0,6 Z" fill="#666"/>
      </marker>
      <marker id="arrow-blue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
        <path d="M0,0 L8,3 L0,6 Z" fill="#4361ee"/>
      </marker>
      <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
        <path d="M0,0 L8,3 L0,6 Z" fill="#2e7d32"/>
      </marker>
      <marker id="arrow-orange" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
        <path d="M0,0 L8,3 L0,6 Z" fill="#e65100"/>
      </marker>
      <filter id="shadow" x="-4%" y="-4%" width="108%" height="116%">
        <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.1"/>
      </filter>
    </defs>

    <!-- ============ ROW 1: User ============ -->
    <!-- User icon -->
    <circle cx="380" cy="30" r="18" fill="#555" filter="url(#shadow)"/>
    <text x="380" y="34" text-anchor="middle" fill="#fff" font-size="16">&#128100;</text>
    <text x="380" y="62" text-anchor="middle" class="node-label" font-weight="600" font-size="10">User</text>

    <!-- Arrow: User → Frontend -->
    <line x1="380" y1="48" x2="380" y2="78" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>
    <text x="390" y="68" class="edge-label">upload files</text>

    <!-- ============ ROW 2: Frontend ============ -->
    <g class="node" filter="url(#shadow)">
      <rect x="250" y="82" width="260" height="52" rx="8" fill="#4361ee"/>
      <text x="380" y="104" text-anchor="middle" class="node-text" font-size="12">Frontend — Vite + React</text>
      <text x="380" y="120" text-anchor="middle" class="node-sub">Home.tsx (Upload) · Dashboard.tsx (Results)</text>
    </g>

    <!-- Arrow: Frontend → Backend -->
    <line x1="380" y1="134" x2="380" y2="164" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>
    <text x="390" y="154" class="edge-label">POST /api/upload</text>

    <!-- ============ ROW 3: Backend API ============ -->
    <g class="node" filter="url(#shadow)">
      <rect x="250" y="168" width="260" height="48" rx="8" fill="#2e7d32"/>
      <text x="380" y="188" text-anchor="middle" class="node-text" font-size="12">Express API Layer</text>
      <text x="380" y="202" text-anchor="middle" class="node-sub">upload · analyze · results · report</text>
    </g>

    <!-- Arrow: Backend → Parsers (left) -->
    <line x1="250" y1="192" x2="150" y2="192" stroke="#2e7d32" stroke-width="1.2" marker-end="url(#arrow-green)"/>
    <text x="195" y="186" class="edge-label">parse</text>

    <!-- Arrow: Backend → DB (right) -->
    <line x1="510" y1="192" x2="590" y2="192" stroke="#e65100" stroke-width="1.2" marker-end="url(#arrow-orange)"/>
    <text x="545" y="186" class="edge-label">store</text>

    <!-- Arrow: Backend → Pipeline (down) -->
    <line x1="380" y1="216" x2="380" y2="248" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>
    <text x="390" y="238" class="edge-label">invoke pipeline</text>

    <!-- ============ SIDE: Parsers ============ -->
    <g class="node" filter="url(#shadow)">
      <rect x="50" y="168" width="96" height="48" rx="8" fill="#5c6bc0"/>
      <text x="98" y="188" text-anchor="middle" class="node-text" font-size="10">Parsers</text>
      <text x="98" y="202" text-anchor="middle" class="node-sub">pdf · docx · md</text>
    </g>

    <!-- ============ SIDE: SQLite ============ -->
    <g class="node" filter="url(#shadow)">
      <rect x="594" y="168" width="120" height="48" rx="8" fill="#e65100"/>
      <text x="654" y="186" text-anchor="middle" class="node-text" font-size="10">SQLite (Prisma)</text>
      <text x="654" y="200" text-anchor="middle" class="node-sub">Run + Document models</text>
    </g>

    <!-- ============ ROW 4: LangGraph Pipeline Box ============ -->
    <g class="node">
      <rect x="190" y="252" width="380" height="180" rx="10" fill="none" stroke="#2e7d32" stroke-width="1.5" stroke-dasharray="6,3"/>
      <text x="380" y="270" text-anchor="middle" font-size="10" font-weight="700" fill="#2e7d32" letter-spacing="1">LANGGRAPH PIPELINE</text>
    </g>

    <!-- Agent 1: RequirementRefiner -->
    <g class="node" filter="url(#shadow)">
      <rect x="210" y="282" width="155" height="44" rx="7" fill="#4361ee"/>
      <text x="287" y="300" text-anchor="middle" class="node-text" font-size="10">1. RequirementRefiner</text>
      <text x="287" y="316" text-anchor="middle" class="node-sub">Parse + embed requirements</text>
    </g>

    <!-- Arrow 1→2 -->
    <line x1="365" y1="304" x2="385" y2="304" stroke="#2e7d32" stroke-width="1.5" marker-end="url(#arrow-green)"/>

    <!-- Agent 2: TestCaseGenerator -->
    <g class="node" filter="url(#shadow)">
      <rect x="389" y="282" width="155" height="44" rx="7" fill="#2e7d32"/>
      <text x="467" y="300" text-anchor="middle" class="node-text" font-size="10">2. TestCaseGenerator</text>
      <text x="467" y="316" text-anchor="middle" class="node-sub">LLM generates test cases</text>
    </g>

    <!-- Arrow 2→3 (down) -->
    <line x1="467" y1="326" x2="467" y2="354" stroke="#2e7d32" stroke-width="1.5" marker-end="url(#arrow-green)"/>

    <!-- Agent 3: TraceabilityAgent -->
    <g class="node" filter="url(#shadow)">
      <rect x="389" y="358" width="155" height="44" rx="7" fill="#5c6bc0"/>
      <text x="467" y="376" text-anchor="middle" class="node-text" font-size="10">3. TraceabilityAgent</text>
      <text x="467" y="392" text-anchor="middle" class="node-sub">Embedding similarity matching</text>
    </g>

    <!-- Arrow 3→4 (left) -->
    <line x1="389" y1="380" x2="365" y2="380" stroke="#2e7d32" stroke-width="1.5" marker-end="url(#arrow-green)"/>

    <!-- Agent 4: ReportGenerator -->
    <g class="node" filter="url(#shadow)">
      <rect x="210" y="358" width="155" height="44" rx="7" fill="#e65100"/>
      <text x="287" y="376" text-anchor="middle" class="node-text" font-size="10">4. ReportGenerator</text>
      <text x="287" y="392" text-anchor="middle" class="node-sub">HTML → Puppeteer → PDF</text>
    </g>

    <!-- Arrow: Agent1 → LLM (left side) -->
    <line x1="210" y1="304" x2="150" y2="304" stroke="#e65100" stroke-width="1.2" marker-end="url(#arrow-orange)"/>
    <text x="175" y="298" class="edge-label">call</text>

    <!-- ============ SIDE: LLM ============ -->
    <g class="node" filter="url(#shadow)">
      <rect x="50" y="282" width="96" height="44" rx="8" fill="#e65100"/>
      <text x="98" y="300" text-anchor="middle" class="node-text" font-size="9">LLM Client</text>
      <text x="98" y="314" text-anchor="middle" class="node-sub">Azure APIM</text>
    </g>

    <!-- Arrow: Agent3 → Embeddings (right side) -->
    <line x1="544" y1="380" x2="600" y2="380" stroke="#5c6bc0" stroke-width="1.2" marker-end="url(#arrow)"/>
    <text x="568" y="374" class="edge-label">embed</text>

    <!-- ============ SIDE: Embeddings ============ -->
    <g class="node" filter="url(#shadow)">
      <rect x="604" y="358" width="110" height="44" rx="8" fill="#5c6bc0"/>
      <text x="659" y="376" text-anchor="middle" class="node-text" font-size="9">Embeddings API</text>
      <text x="659" y="390" text-anchor="middle" class="node-sub">text-embedding-3-large</text>
    </g>

    <!-- Arrow: ReportGenerator → PDF output -->
    <line x1="287" y1="402" x2="287" y2="450" stroke="#e65100" stroke-width="1.5" marker-end="url(#arrow-orange)"/>
    <text x="297" y="430" class="edge-label">render PDF</text>

    <!-- ============ ROW 5: Output ============ -->
    <g class="node" filter="url(#shadow)">
      <rect x="210" y="454" width="155" height="36" rx="8" fill="#c62828"/>
      <text x="287" y="476" text-anchor="middle" class="node-text" font-size="11">PDF Report</text>
    </g>

    <!-- Arrow: Dashboard ← GET /api/report -->
    <line x1="365" y1="472" x2="560" y2="472" stroke="#666" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
    <text x="460" y="466" class="edge-label">GET /api/report/:runId</text>

    <!-- Dashboard result box -->
    <g class="node" filter="url(#shadow)">
      <rect x="564" y="454" width="150" height="36" rx="8" fill="#4361ee"/>
      <text x="639" y="476" text-anchor="middle" class="node-text" font-size="10">Dashboard Display</text>
    </g>

    <!-- Arrow back to user -->
    <line x1="639" y1="454" x2="639" y2="90" stroke="#4361ee" stroke-width="1" stroke-dasharray="4,3"/>
    <line x1="639" y1="90" x2="510" y2="90" stroke="#4361ee" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrow-blue)"/>
    <text x="645" y="270" class="edge-label" transform="rotate(-90, 645, 270)">results + download</text>

    <!-- Langfuse side note -->
    <g class="node" opacity="0.6">
      <rect x="620" y="280" width="90" height="32" rx="6" fill="#f5f5f5" stroke="#ccc" stroke-width="1"/>
      <text x="665" y="294" text-anchor="middle" font-size="8" fill="#888" font-family="-apple-system, sans-serif">Langfuse</text>
      <text x="665" y="306" text-anchor="middle" font-size="7" fill="#aaa" font-family="-apple-system, sans-serif">(observability)</text>
    </g>
    <line x1="620" y1="296" x2="544" y2="296" stroke="#ccc" stroke-width="0.8" stroke-dasharray="3,3"/>
  </svg>

  <div class="footer">
    <span>PID: GOH0060-BLR005</span>
    <span>Tracewise AI — PDLC Hackathon 2026</span>
    <span>GOH-UC-076</span>
  </div>

</div>
</body>
</html>
